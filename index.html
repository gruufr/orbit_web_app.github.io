<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --btn-bg: #000000;
            --btn-text: #ffffff;
        }

        body.dark-theme {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --border-color: #ffffff;
            --btn-bg: #ffffff;
            --btn-text: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        .card {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .value {
            font-size: 18px;
            font-weight: bold;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            font-family: inherit;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.7;
        }

        #loader {
            text-align: center;
            font-weight: bold;
            margin-top: 50px;
            text-transform: uppercase;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container hidden" id="app">
        <div class="header">ORBIT SERVICE</div>
        
        <div class="card">
            <div class="label">Текущий статус</div>
            <div class="value" id="status">-</div>
        </div>

        <div class="card">
            <div class="label">Данные (Использовано / Лимит)</div>
            <div class="value" id="traffic">- / -</div>
        </div>

        <div class="card">
            <div class="label">Активно до</div>
            <div class="value" id="expire">-</div>
        </div>

        <button class="btn" id="copyBtn">Скопировать подписку</button>
    </div>

    <div id="loader">СИНХРОНИЗАЦИЯ...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.colorScheme === 'dark') {
            document.body.classList.add('dark-theme');
        }

        const userId = tg.initDataUnsafe?.user?.id;
        let subLink = "";

        const BACKEND_URL = "https://api.orbit.gruu.ru:8888/api/user/"; 

        async function fetchData() {
            if (!userId) {
                document.getElementById('loader').innerText = "ОШИБКА: ID НЕ АВТОРИЗОВАН";
                return;
            }

            try {
                // Добавляем timestamp, чтобы избежать кэширования браузером
                const response = await fetch(`${BACKEND_URL}${userId}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Данные отсутствуют');
                
                const data = await response.json();
                
                document.getElementById('status').innerText = data.status === 'active' ? 'АКТИВЕН' : 'ОГРАНИЧЕН';
                document.getElementById('traffic').innerText = `${data.used_gb} GB / ${data.total_gb} GB`;
                document.getElementById('expire').innerText = data.expire_str;
                
                // Ссылка на подписку из Marzban
                subLink = data.sub_link;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');

            } catch (error) {
                document.getElementById('loader').innerText = "ОШИБКА ДОСТУПА";
                console.error(error);
            }
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (subLink) {
                // Используем Telegram API для копирования и уведомления
                navigator.clipboard.writeText(subLink).then(() => {
                    if (tg.showScanQrPopup) { // Проверка на наличие API
                         tg.showAlert("Подписка скопирована в буфер обмена");
                    } else {
                         alert("Скопировано!");
                    }
                }).catch(err => {
                    // Резервный метод для старых устройств
                    const el = document.createElement('textarea');
                    el.value = subLink;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    tg.showAlert("Подписка скопирована");
                });
            } else {
                tg.showAlert("Данные подписки еще не загружены");
            }
        });

        fetchData();
    </script>
</body>
</html>
